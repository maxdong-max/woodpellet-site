<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macreat 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
    
    .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; }
    .login-box h1 { text-align: center; margin-bottom: 30px; color: #1a1a2e; }
    .login-box input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e1e5eb; border-radius: 8px; font-size: 14px; }
    .login-box button { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-error { color: #ef4444; font-size: 14px; margin-bottom: 12px; display: none; }
    
    .admin-layout { display: none; min-height: 100vh; }
    .sidebar { width: 240px; background: #1a1a2e; color: white; position: fixed; height: 100vh; padding: 20px 0; }
    .sidebar h2 { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .sidebar nav a { display: block; padding: 14px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; }
    .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.1); color: white; }
    .sidebar .logout { position: absolute; bottom: 20px; left: 20px; right: 20px; }
    .sidebar .logout button { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
    
    .main { margin-left: 240px; padding: 30px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 24px; color: #1a1a2e; }
    
    .content { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .section { display: none; }
    .section.active { display: block; }
    .section h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e1e5eb; }
    
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 14px; text-align: left; border-bottom: 1px solid #e1e5eb; }
    .data-table th { background: #f9fafb; font-weight: 600; color: #374151; }
    .data-table tr:hover { background: #f9fafb; }
    .data-table .actions { display: flex; gap: 8px; }
    .data-table .actions button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .data-table .actions .edit { background: #3b82f6; color: white; }
    .data-table .actions .delete { background: #ef4444; color: white; }
    .data-table .toggle { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .data-table .toggle.on { background: #22c55e; color: white; }
    .data-table .toggle.off { background: #9ca3af; color: white; }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #374151; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #e1e5eb; border-radius: 8px; font-size: 14px; }
    .btn-add { padding: 12px 24px; background: #22c55e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-save { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-card h3 { font-size: 14px; color: #6b7280; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <h1>🦐 Macreat 后台</h1>
      <div class="login-error" id="loginError">用户名或密码错误</div>
      <input type="text" id="username" placeholder="用户名" value="admin">
      <input type="password" id="password" placeholder="密码">
      <button onclick="login()">登录</button>
    </div>
  </div>

  <div class="admin-layout" id="adminLayout">
    <aside class="sidebar">
      <h2>🦐 Macreat</h2>
      <nav>
        <a href="#" data-section="dashboard" class="active">📊 数据统计</a>
        <a href="#" data-section="social">🔗 社交链接</a>
        <a href="#" data-section="carousel">🎠 轮播图</a>
        <a href="#" data-section="navigation">🧭 导航管理</a>
        <a href="#" data-section="settings">⚙️ 系统设置</a>
      </nav>
      <div class="logout"><button onclick="logout()">退出登录</button></div>
    </aside>
    
    <main class="main">
      <div class="header"><h1 id="pageTitle">数据统计</h1></div>
      
      <div class="content">
        <div class="section active" id="section-dashboard">
          <div class="stats-grid">
            <div class="stat-card"><h3>今日访客</h3><div class="value" id="todayVisitors">-</div></div>
            <div class="stat-card"><h3>总访客 (7天)</h3><div class="value" id="totalVisitors">-</div></div>
          </div>
          <h2>热门页面</h2>
          <table class="data-table"><thead><tr><th>页面</th><th>访问量</th></tr></thead><tbody id="topPages"></tbody></table>
        </div>
        
        <div class="section" id="section-social">
          <h2>社交链接管理</h2>
          <div class="form-grid">
            <div class="form-group"><label>名称</label><input type="text" id="socialName" placeholder="如: WhatsApp"></div>
            <div class="form-group"><label>图标</label><select id="socialIcon"><option value="whatsapp">WhatsApp</option><option value="email">Email</option><option value="facebook">Facebook</option><option value="telegram">Telegram</option><option value="linkedin">LinkedIn</option><option value="youtube">YouTube</option><option value="instagram">Instagram</option></select></div>
            <div class="form-group"><label>链接地址</label><input type="text" id="socialHref" placeholder="https://..."></div>
            <div class="form-group"><label>位置</label><select id="socialPosition"><option value="header">顶部导航</option><option value="footer">底部</option><option value="floating">悬浮</option></select></div>
          </div>
          <button class="btn-add" onclick="addSocial()">+ 添加链接</button>
          <h2 style="margin-top:30px">现有链接</h2>
          <table class="data-table"><thead><tr><th>名称</th><th>链接</th><th>位置</th><th>操作</th></tr></thead><tbody id="socialTable"></tbody></table>
        </div>
        
        <div class="section" id="section-carousel">
          <h2>轮播图管理</h2>
          <div class="form-grid">
            <div class="form-group"><label>标题</label><input type="text" id="carouselTitle" placeholder="主标题"></div>
            <div class="form-group"><label>副标题</label><input type="text" id="carouselSubtitle" placeholder="副标题"></div>
            <div class="form-group"><label>图片URL</label><input type="text" id="carouselImage" placeholder="https://..."></div>
            <div class="form-group"><label>按钮文字</label><input type="text" id="carouselCta" placeholder="Contact Us"></div>
            <div class="form-group"><label>按钮链接</label><input type="text" id="carouselLink" placeholder="/contact"></div>
            <div class="form-group"><label>语言</label><select id="carouselLang"><option value="en">English</option><option value="zh">中文</option><option value="id">Indonesia</option></select></div>
          </div>
          <button class="btn-add" onclick="addCarousel()">+ 添加轮播图</button>
          <h2 style="margin-top:30px">现有轮播图</h2>
          <table class="data-table"><thead><tr><th>标题</th><th>图片</th><th>语言</th><th>操作</th></tr></thead><tbody id="carouselTable"></tbody></table>
        </div>
        
        <div class="section" id="section-navigation">
          <h2>导航管理</h2>
          <div class="form-grid">
            <div class="form-group"><label>文本</label><input type="text" id="navText" placeholder="如: Home"></div>
            <div class="form-group"><label>链接</label><input type="text" id="navHref" placeholder="/page"></div>
            <div class="form-group"><label>语言</label><select id="navLang"><option value="en">English</option><option value="zh">中文</option><option value="id">Indonesia</option></select></div>
          </div>
          <button class="btn-add" onclick="addNav()">+ 添加导航</button>
          <h2 style="margin-top:30px">现有导航</h2>
          <table class="data-table"><thead><tr><th>文本</th><th>链接</th><th>语言</th><th>操作</th></tr></thead><tbody id="navTable"></tbody></table>
        </div>
        
        <div class="section" id="section-settings">
          <h2>修改密码</h2>
          <div class="form-group"><label>原密码</label><input type="password" id="oldPassword"></div>
          <div class="form-group"><label>新密码</label><input type="password" id="newPassword"></div>
          <button class="btn-save" onclick="changePassword()">修改密码</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('adminToken');
    
    if (token) { showAdmin(); loadDashboard(); }
    
    async function login() {
      const res = await fetch(API + '/api/admin/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (data.token) { token = data.token; localStorage.setItem('adminToken', token); showAdmin(); loadDashboard(); }
      else { document.getElementById('loginError').style.display = 'block'; }
    }
    
    function logout() { localStorage.removeItem('adminToken'); location.reload(); }
    function showAdmin() { document.getElementById('loginPage').style.display = 'none'; document.getElementById('adminLayout').style.display = 'flex'; }
    
    document.querySelectorAll('.sidebar nav a').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const section = link.dataset.section;
        document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + section).classList.add('active');
        const titles = { dashboard: '数据统计', social: '社交链接', carousel: '轮播图', navigation: '导航管理', settings: '系统设置' };
        document.getElementById('pageTitle').textContent = titles[section];
        if (section === 'dashboard') loadDashboard();
        if (section === 'social') loadSocial();
        if (section === 'carousel') loadCarousel();
        if (section === 'navigation') loadNav();
      });
    });
    
    async function loadDashboard() {
      const res = await fetch(API + '/api/track?days=7');
      const data = await res.json();
      document.getElementById('todayVisitors').textContent = data.todayVisitors || 0;
      document.getElementById('totalVisitors').textContent = data.totalVisitors || 0;
      document.getElementById('topPages').innerHTML = (data.topPages || []).map(p => `<tr><td>${p.url}</td><td>${p.views}</td></tr>`).join('');
    }
    
    async function loadSocial() {
      const res = await fetch(API + '/api/admin/social', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('socialTable').innerHTML = data.map(s => `<tr><td>${s.name}</td><td>${s.href}</td><td>${s.position}</td><td class="actions"><button class="delete" onclick="deleteSocial(${s.id})">删除</button></td></tr>`).join('');
    }
    
    async function addSocial() {
      await fetch(API + '/api/admin/social', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: document.getElementById('socialName').value, icon: document.getElementById('socialIcon').value, href: document.getElementById('socialHref').value, enabled: true, position: document.getElementById('socialPosition').value, sort_order: 0 })
      });
      loadSocial();
    }
    
    async function deleteSocial(id) { if (confirm('确定删除?')) { await fetch(API + '/api/admin/social?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); loadSocial(); } }
    
    async function loadCarousel() {
      const res = await fetch(API + '/api/admin/carousel', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('carouselTable').innerHTML = data.map(c => `<tr><td>${c.title}</td><td>${c.image ? '✅' : '❌'}</td><td>${c.lang}</td><td class="actions"><button class="delete" onclick="deleteCarousel(${c.id})">删除</button></td></tr>`).join('');
    }
    
    async function addCarousel() {
      await fetch(API + '/api/admin/carousel', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ title: document.getElementById('carouselTitle').value, subtitle: document.getElementById('carouselSubtitle').value, image: document.getElementById('carouselImage').value, cta_text: document.getElementById('carouselCta').value, cta_link: document.getElementById('carouselLink').value, lang: document.getElementById('carouselLang').value, sort_order: 0 })
      });
      loadCarousel();
    }
    
    async function deleteCarousel(id) { if (confirm('确定删除?')) { await fetch(API + '/api/admin/carousel?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); loadCarousel(); } }
    
    async function loadNav() {
      const res = await fetch(API + '/api/admin/navigation', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('navTable').innerHTML = data.map(n => `<tr><td>${n.text}</td><td>${n.href}</td><td>${n.lang}</td><td class="actions"><button class="delete" onclick="deleteNav(${n.id})">删除</button></td></tr>`).join('');
    }
    
    async function addNav() {
      await fetch(API + '/api/admin/navigation', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ text: document.getElementById('navText').value, href: document.getElementById('navHref').value, lang: document.getElementById('navLang').value, sort_order: 0 })
      });
      loadNav();
    }
    
    async function deleteNav(id) { if (confirm('确定删除?')) { await fetch(API + '/api/admin/navigation?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); loadNav(); } }
    
    async function changePassword() { alert('修改密码功能开发中'); }
  </script>
</body>
</html>
